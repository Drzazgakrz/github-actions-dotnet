name: Secrets workflow

on:
    pull_request:
      branches: ["main"]


env:
  API_CSPROJ_PATH: ".src/GitHubActionsDotNet.Api/GitHubActionsDotNet.Api.csproj"

jobs:
    secrets:
        name: Secrets demo
        runs-on: ubuntu-latest

        steps:
            - name: echo env variables
              run: echo "$API_CSPROJ_PATH"

    new__job:
        name: SNew job
        runs-on: ubuntu-latest
        env:
          JOB_NAME: "new__job"

        steps:
            - name: echo env variables
              run: echo "$JOB_NAME"
