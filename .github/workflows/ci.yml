name: CI

on:
    push:
        branches: ["main"]

jobs:
    build:
        name: CI
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v4

            - name: Set up .NET Core
              uses: actions/setup-dotnet@v4
              with:
                dotnet-version: 10.0
                        
            - name: Run tests
              run: dotnet test --configuration Release

            - name: Publish
              run: dotnet publish src/GitHubActionsDotNet.Api/GitHubActionsDotNet.Api.csproj --configuration Release -o artifacts
            
            - uses: actions/upload-artifact@v4
              with: 
                name: dometrain-artifact
                path: artifacts/

    deploy_dev:
      name: Deploy dev
      needs: build
      uses: ./.github/workflows/step-deploy.yml
      with:
        env: dev
        resource_group_name: azure-group-name
        app_service_name: app-service-name
      secrets: inherit

    deploy_prod:
      name: Deploy prod
      needs: deploy_dev
      uses: ./.github/workflows/step-deploy.yml
      with:
        env: prod
        resource_group_name: azure-group-name
        app_service_name: app-service-name
      secrets: inherit

